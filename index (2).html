<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Typing Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neutral-900: hsl(0, 0%, 7%);
      --neutral-800: hsl(0, 0%, 15%);
      --neutral-500: hsl(240, 3%, 46%);
      --neutral-400: hsl(240, 1%, 59%);
      --neutral-0: hsl(0, 0%, 100%);
      --blue-600: hsl(214, 100%, 55%);
      --blue-400: hsl(210, 100%, 65%);
      --red-500: hsl(354, 63%, 57%);
      --green-500: hsl(140, 63%, 57%);
      --yellow-400: hsl(49, 85%, 70%);
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--neutral-900);
      color: var(--neutral-0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--neutral-800);
    }

    .logo { height: 2rem; }

    .pb-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--neutral-800);
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-size: 0.875rem;
      color: var(--neutral-400);
    }

    .pb-badge img { width: 1.125rem; height: 1.125rem; }
    .pb-badge strong { color: var(--neutral-0); font-weight: 700; }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 56rem;
      margin: 0 auto;
      width: 100%;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .stat-card {
      background: var(--neutral-800);
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--neutral-500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--neutral-0);
      line-height: 1;
    }

    .stat-value span {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--neutral-400);
      margin-left: 0.25rem;
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--neutral-800);
      border-radius: 0.75rem;
      padding: 0.375rem 0.5rem;
    }

    .control-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--neutral-500);
      padding: 0 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .pill-btn {
      background: transparent;
      border: none;
      color: var(--neutral-400);
      font-family: 'Sora', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.375rem 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .pill-btn:hover { color: var(--neutral-0); background: rgba(255,255,255,0.06); }
    .pill-btn:focus-visible { outline: 2px solid var(--blue-600); outline-offset: 2px; }
    .pill-btn.active { background: var(--blue-600); color: var(--neutral-0); }

    /* ── PASSAGE AREA ── */
    .passage-container {
      background: var(--neutral-800);
      border-radius: 1rem;
      padding: 2rem;
      position: relative;
      cursor: text;
      transition: box-shadow 0.2s;
    }

    .passage-container:hover { box-shadow: 0 0 0 2px rgba(25, 125, 255, 0.3); }
    .passage-container:focus-within { box-shadow: 0 0 0 2px var(--blue-600); }

    #passage {
      font-size: 1.125rem;
      line-height: 1.8;
      letter-spacing: 0.01em;
      color: var(--neutral-500);
      user-select: none;
      min-height: 5rem;
      position: relative;
    }

    .char {
      position: relative;
      transition: color 0.05s;
    }

    .char.correct { color: var(--green-500); }
    .char.incorrect {
      color: var(--red-500);
      text-decoration: underline;
      text-decoration-color: var(--red-500);
    }

    .char.cursor::before {
      content: '';
      position: absolute;
      left: -1px;
      top: 0.1em;
      bottom: 0.1em;
      width: 2px;
      background: var(--blue-600);
      border-radius: 1px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #hidden-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    /* ── START SECTION ── */
    .start-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
    }

    .start-btn {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      background: var(--blue-600);
      color: var(--neutral-0);
      border: none;
      border-radius: 0.75rem;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.875rem 2rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .start-btn:hover { background: var(--blue-400); transform: translateY(-1px); }
    .start-btn:active { transform: translateY(0); }
    .start-btn:focus-visible { outline: 2px solid var(--blue-400); outline-offset: 3px; }
    .start-btn img { width: 1.25rem; }

    .start-hint {
      font-size: 0.875rem;
      color: var(--neutral-500);
    }

    /* ── RESTART BTN ── */
    .restart-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      border: 1px solid var(--neutral-500);
      color: var(--neutral-400);
      border-radius: 0.75rem;
      font-family: 'Sora', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      align-self: flex-end;
    }

    .restart-btn img { width: 1rem; filter: brightness(0.7); transition: filter 0.15s; }
    .restart-btn:hover { border-color: var(--neutral-0); color: var(--neutral-0); }
    .restart-btn:hover img { filter: brightness(1); }
    .restart-btn:focus-visible { outline: 2px solid var(--blue-600); outline-offset: 2px; }

    /* ── RESULTS OVERLAY ── */
    #results-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 1rem;
    }

    #results-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .results-card {
      background: var(--neutral-800);
      border-radius: 1.5rem;
      padding: 2.5rem;
      max-width: 28rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
      overflow: hidden;
      transform: scale(0.92);
      transition: transform 0.3s;
    }

    #results-overlay.visible .results-card {
      transform: scale(1);
    }

    .results-icon { width: 3.5rem; }

    .results-title {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
    }

    .results-subtitle {
      font-size: 0.9375rem;
      color: var(--neutral-400);
      text-align: center;
      margin-top: -1rem;
    }

    .results-stats {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    .result-stat {
      background: var(--neutral-900);
      border-radius: 0.75rem;
      padding: 0.875rem 1rem;
      text-align: center;
    }

    .result-stat-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--neutral-500);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.25rem;
    }

    .result-stat-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .result-stat-sub {
      font-size: 0.75rem;
      color: var(--neutral-400);
    }

    .go-again-btn {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      background: var(--blue-600);
      color: var(--neutral-0);
      border: none;
      border-radius: 0.75rem;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.875rem 2rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
      justify-content: center;
    }

    .go-again-btn:hover { background: var(--blue-400); transform: translateY(-1px); }
    .go-again-btn:active { transform: translateY(0); }
    .go-again-btn:focus-visible { outline: 2px solid var(--blue-400); outline-offset: 3px; }

    /* ── CONFETTI ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    /* ── NEW PB BADGE in results ── */
    .new-pb-banner {
      background: linear-gradient(135deg, hsl(49, 85%, 50%), hsl(49, 85%, 70%));
      color: hsl(0, 0%, 7%);
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .new-pb-banner img { width: 1.25rem; }

    /* ── TIMED BAR ── */
    .timer-bar-wrap {
      height: 3px;
      background: var(--neutral-900);
      border-radius: 999px;
      overflow: hidden;
      margin-top: -0.75rem;
    }

    #timer-bar {
      height: 100%;
      background: var(--blue-600);
      width: 100%;
      transition: width 1s linear, background 0.3s;
      border-radius: 999px;
    }

    /* ── STATE VISIBILITY ── */
    .not-started-only, .started-only, .restart-only { display: none; }
    body.state-not-started .not-started-only { display: flex; }
    body.state-started .started-only { display: flex; }
    body.state-started .restart-only,
    body.state-not-started .restart-only { display: flex; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.6875rem;
      color: var(--neutral-500);
    }

    footer a { color: hsl(228, 45%, 44%); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 1rem; }
      main { padding: 1.25rem 1rem; gap: 1.25rem; }

      .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
      .stat-card { padding: 0.75rem; }
      .stat-value { font-size: 1.25rem; }

      .controls { gap: 0.75rem; }
      .control-group { flex-wrap: wrap; }

      #passage { font-size: 1rem; }

      .results-stats { grid-template-columns: repeat(3, 1fr); }
      .result-stat-value { font-size: 1.125rem; }
      .results-card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body class="state-not-started">

  <canvas id="confetti-canvas"></canvas>

  <!-- RESULTS OVERLAY -->
  <div id="results-overlay" role="dialog" aria-modal="true" aria-labelledby="results-title">
    <div class="results-card">
      <img class="results-icon" id="results-icon" src="" alt="">
      <h2 class="results-title" id="results-title">Test Complete!</h2>
      <p class="results-subtitle" id="results-subtitle">Solid run. Keep pushing to beat your high score.</p>
      <div id="new-pb-banner-wrap"></div>
      <div class="results-stats">
        <div class="result-stat">
          <div class="result-stat-label">WPM</div>
          <div class="result-stat-value" id="r-wpm">—</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-label">Accuracy</div>
          <div class="result-stat-value" id="r-accuracy">—</div>
          <div class="result-stat-sub">%</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-label">Chars</div>
          <div class="result-stat-value" id="r-chars">—</div>
          <div class="result-stat-sub" id="r-chars-sub"></div>
        </div>
      </div>
      <button class="go-again-btn" id="go-again-btn">Go Again</button>
    </div>
  </div>

  <!-- HEADER -->
  <header>
    <svg class="logo" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="hsl(214,100%,55%)"/>
      <path d="M8 10h16M8 16h12M8 22h8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <text x="40" y="22" font-family="Sora,sans-serif" font-weight="700" font-size="14" fill="white">TypeTest</text>
    </svg>

    <div class="pb-badge">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1.5l2.09 4.235 4.66.675-3.375 3.29.795 4.64L9 12.085l-4.17 2.255.795-4.64L2.25 6.41l4.66-.675L9 1.5z" fill="hsl(49,85%,70%)" stroke="hsl(49,85%,70%)" stroke-width="1" stroke-linejoin="round"/></svg>
      Personal Best: <strong id="pb-display">—</strong> WPM
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-label">WPM</span>
        <div class="stat-value" id="stat-wpm">0</div>
      </div>
      <div class="stat-card">
        <span class="stat-label">Accuracy</span>
        <div class="stat-value" id="stat-acc">—<span>%</span></div>
      </div>
      <div class="stat-card">
        <span class="stat-label">Time</span>
        <div class="stat-value" id="stat-time">0<span id="time-unit">s</span></div>
      </div>
    </div>

    <!-- TIMED BAR -->
    <div class="timer-bar-wrap" id="timer-bar-wrap" style="display:none">
      <div id="timer-bar"></div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <div class="control-group">
        <span class="control-label">Difficulty</span>
        <button class="pill-btn active" data-difficulty="easy">Easy</button>
        <button class="pill-btn" data-difficulty="medium">Medium</button>
        <button class="pill-btn" data-difficulty="hard">Hard</button>
      </div>
      <div class="control-group">
        <span class="control-label">Mode</span>
        <button class="pill-btn active" data-mode="timed">Timed (60s)</button>
        <button class="pill-btn" data-mode="passage">Passage</button>
      </div>
      <button class="restart-btn restart-only" id="restart-btn" style="margin-left:auto">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.65-4.14L9 6h6V0l-1.35 2.35z" fill="currentColor"/></svg>
        Restart
      </button>
    </div>

    <!-- PASSAGE -->
    <div class="passage-container" id="passage-container">
      <div id="passage"></div>
      <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-hidden="true" tabindex="-1">
    </div>

    <!-- START SECTION -->
    <div class="start-section not-started-only">
      <button class="start-btn" id="start-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 3.5l12 6.5-12 6.5V3.5z" fill="white"/></svg>
        Start Typing Test
      </button>
      <p class="start-hint">Or click the text and start typing</p>
    </div>
  </main>

  <footer>
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const DATA = {"easy":[{"id":"easy-1","text":"The sun rose over the quiet town. Birds sang in the trees as people woke up and started their day. It was going to be a warm and sunny morning."},{"id":"easy-2","text":"She walked to the store to buy some bread and milk. The shop was busy but she found what she needed quickly. On her way home, she saw a friend and waved."},{"id":"easy-3","text":"The dog ran across the park chasing a ball. He was fast and loved to play. After a while, he got tired and lay down in the cool shade of a big oak tree."},{"id":"easy-4","text":"I like to read books before I go to sleep. It helps me relax after a long day. My favorite stories are about adventure and travel to far away places."},{"id":"easy-5","text":"The kitchen smelled of fresh coffee and toast. Mom was making breakfast while dad read the news. It was a normal morning in their small but cozy home."},{"id":"easy-6","text":"We went to the beach last summer. The water was blue and the sand was warm. We built a big sand castle and looked for shells along the shore."},{"id":"easy-7","text":"The cat sat on the window sill watching the rain. Drops fell down the glass one by one. She seemed happy to be inside where it was dry and warm."},{"id":"easy-8","text":"My best friend lives next door to me. We play games together after school. Sometimes we ride our bikes around the block or sit and talk for hours."},{"id":"easy-9","text":"Spring is my favorite time of year. Flowers start to bloom and the days get longer. I love to see the trees turn green again after the cold winter months."},{"id":"easy-10","text":"The music played softly in the room. She closed her eyes and let the sounds wash over her. It was a simple song but it made her feel at peace."}],"medium":[{"id":"medium-1","text":"Learning a new skill takes patience and consistent practice. Whether you're studying a language, picking up an instrument, or mastering a sport, the key is to show up every day. Small improvements compound over time, and before you know it, you'll have made remarkable progress."},{"id":"medium-2","text":"The old lighthouse had stood on the cliff for over a century, guiding sailors safely through treacherous waters. Its beam cut through the fog each night, a reassuring presence for those navigating the rocky coastline. Many storms had tested its structure, but it remained steadfast."},{"id":"medium-3","text":"Coffee culture has evolved dramatically in recent decades. What was once a simple morning ritual has become an art form, with baristas crafting intricate latte designs and roasters sourcing beans from remote mountain villages. The humble cup of coffee now tells a global story."},{"id":"medium-4","text":"Urban gardens are transforming city landscapes around the world. Residents are converting rooftops, balconies, and abandoned lots into thriving green spaces. These initiatives not only provide fresh produce but also create communities, reduce stress, and help combat the urban heat island effect."},{"id":"medium-5","text":"The documentary explored how technology shapes our daily habits. From the moment we wake to an alarm on our phones to the podcasts we fall asleep to, digital tools have woven themselves into the fabric of modern life. The question is: are we in control?"},{"id":"medium-6","text":"Traveling by train offers a unique perspective on the countryside. Unlike flying, which reduces landscapes to abstract patterns, rail journeys let you witness the gradual transitions between regions. You see farms give way to forests, and small towns emerge from rolling hills."},{"id":"medium-7","text":"The chef believed that great cooking starts with quality ingredients. She visited local farmers each week, selecting vegetables at their peak ripeness. Her menu changed with the seasons, reflecting what the land offered. Diners appreciated the freshness they could taste in every bite."},{"id":"medium-8","text":"Libraries have reinvented themselves for the digital age. Beyond lending books, they now offer coworking spaces, 3D printers, recording studios, and coding workshops. These community hubs have become places where people of all ages come to learn, create, and connect with others."},{"id":"medium-9","text":"The architect designed buildings that worked with nature rather than against it. Large windows captured natural light, reducing the need for electricity. Green roofs absorbed rainwater and provided insulation. Her philosophy was simple: sustainable design should be beautiful, functional, and accessible to everyone."},{"id":"medium-10","text":"Night markets come alive after sunset in cities across Asia. Vendors set up stalls selling everything from grilled skewers to handmade crafts. The air fills with enticing aromas and the buzz of conversation. Locals and tourists alike wander through, sampling street food and hunting for bargains."}],"hard":[{"id":"hard-1","text":"The philosopher's argument hinged on a seemingly paradoxical assertion: that absolute freedom, pursued without constraint, inevitably undermines itself. \"Consider,\" she wrote, \"how the libertarian ideal—when taken to its logical extreme—produces conditions in which the powerful dominate the weak, thereby eliminating freedom for the majority.\" Her critics dismissed this as sophistry; her supporters hailed it as profound."},{"id":"hard-2","text":"Quantum entanglement—Einstein's \"spooky action at a distance\"—continues to perplex physicists and philosophers alike. When two particles become entangled, measuring one instantaneously affects the other, regardless of the distance separating them. This phenomenon doesn't violate relativity (no information travels faster than light), yet it challenges our intuitions about locality, causality, and the nature of reality itself."},{"id":"hard-3","text":"The Renaissance polymath's correspondence reveals a mind of extraordinary breadth: in a single week's letters, he discussed astronomical observations, critiqued a colleague's architectural drawings, proposed improvements to the city's sewage system, and composed a sonnet for a patron's daughter. \"Specialization,\" he remarked wryly, \"is for insects.\" His contemporaries found him exhausting; posterity finds him inspirational."},{"id":"hard-4","text":"Algorithmic trading has fundamentally restructured financial markets. High-frequency systems execute thousands of transactions per second, exploiting minute price discrepancies across exchanges. Critics argue this creates systemic fragility—the 2010 \"Flash Crash\" saw the Dow Jones plummet 1,000 points in minutes before recovering. Proponents counter that algorithms provide liquidity and reduce spreads, ultimately benefiting retail investors."},{"id":"hard-5","text":"The biographer faced an ethical dilemma: her subject's private journals—recently discovered in an attic—contained revelations that would overturn his carefully cultivated public image. Should she publish them? \"Biography,\" she mused, \"exists in tension between truth-telling and respect for the dead.\" After months of deliberation, she chose disclosure, reasoning that sanitized history serves no one."},{"id":"hard-6","text":"Microplastics have infiltrated virtually every ecosystem on Earth, from the Mariana Trench to Arctic ice cores. These polymer fragments—smaller than 5mm in diameter—originate from degrading consumer products, synthetic textiles, and industrial processes. Researchers have detected them in human blood, placental tissue, and breast milk; their long-term health implications remain disturbingly unclear. The ubiquity of plastic pollution represents an unprecedented experiment on planetary biology."},{"id":"hard-7","text":"The conductor's interpretation of Mahler's Ninth Symphony emphasized its prophetic qualities—the premonition of catastrophe, the aching nostalgia for a world about to vanish. \"Mahler composed this knowing he was dying,\" she explained in the program notes, \"but he also intuited, somehow, that European civilization itself stood at the precipice.\" The orchestra's performance—hushed, trembling, transcendent—left the audience in stunned silence."},{"id":"hard-8","text":"Constitutional scholars continue debating the \"counter-majoritarian difficulty\": how can judicial review—whereby unelected judges overturn legislation passed by democratic representatives—be reconciled with popular sovereignty? Some argue courts protect minority rights against tyrannical majorities; others contend this reasoning masks ideological preferences in neutral-sounding jurisprudence. The tension, perhaps, is irresolvable; democratic systems must balance competing values rather than optimize for any single principle."},{"id":"hard-9","text":"The novelist's prose style—elliptical, fragmented, punctuated by abrupt temporal shifts—reflected her thematic preoccupations: memory's unreliability, identity's fluidity, the impossibility of objective narration. \"Every story,\" she declared in an interview, \"is simultaneously true and false; it reveals by concealing, illuminates by casting shadows.\" Critics accused her of obscurantism; she responded that clarity itself can be a form of deception."},{"id":"hard-10","text":"The archaeological expedition unearthed artifacts that complicated prevailing theories about Bronze Age trade networks. Obsidian from Anatolia, lapis lazuli from Afghanistan, and amber from the Baltic—all discovered in a single Mycenaean tomb—suggested commercial connections far more extensive than previously hypothesized. \"We've underestimated ancient peoples' navigational capabilities and their appetite for luxury goods,\" the lead researcher observed. \"Globalization isn't as modern as we assume.\""}]};

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  difficulty: 'easy',
  mode: 'timed',          // 'timed' | 'passage'
  passage: '',
  typed: [],              // array of booleans: true=correct, false=error
  position: 0,
  started: false,
  finished: false,
  startTime: null,
  elapsed: 0,             // seconds
  timerInterval: null,
  totalErrors: 0,         // errors that accumulated (never decremented by backspace)
  personalBest: null,
};

// ─── DOM REFS ───────────────────────────────────────────────────────────────
const passageEl = document.getElementById('passage');
const hiddenInput = document.getElementById('hidden-input');
const statWpm = document.getElementById('stat-wpm');
const statAcc = document.getElementById('stat-acc');
const statTime = document.getElementById('stat-time');
const timeUnit = document.getElementById('time-unit');
const pbDisplay = document.getElementById('pb-display');
const startBtn = document.getElementById('start-btn');
const restartBtn = document.getElementById('restart-btn');
const passageContainer = document.getElementById('passage-container');
const timerBarWrap = document.getElementById('timer-bar-wrap');
const timerBar = document.getElementById('timer-bar');
const resultsOverlay = document.getElementById('results-overlay');
const goAgainBtn = document.getElementById('go-again-btn');

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  state.personalBest = parseInt(localStorage.getItem('pb-wpm')) || null;
  updatePbDisplay();
  loadPassage();
}

function updatePbDisplay() {
  pbDisplay.textContent = state.personalBest ? state.personalBest : '—';
}

// ─── PASSAGE ────────────────────────────────────────────────────────────────
function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function loadPassage() {
  const passages = DATA[state.difficulty];
  const p = getRandom(passages);
  state.passage = p.text;
  state.typed = [];
  state.position = 0;
  state.totalErrors = 0;
  renderPassage();
}

function renderPassage() {
  passageEl.innerHTML = '';
  for (let i = 0; i < state.passage.length; i++) {
    const span = document.createElement('span');
    span.className = 'char';
    span.dataset.index = i;
    if (i === state.position && state.started) span.classList.add('cursor');

    const typed = state.typed[i];
    if (typed === true) span.classList.add('correct');
    else if (typed === false) span.classList.add('incorrect');

    const ch = state.passage[i];
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    passageEl.appendChild(span);
  }

  // cursor before first char if not started
  if (!state.started && !state.finished) {
    const firstChar = passageEl.querySelector('.char[data-index="0"]');
    if (firstChar) firstChar.classList.add('cursor');
  }
}

// ─── TYPING ─────────────────────────────────────────────────────────────────
hiddenInput.addEventListener('keydown', handleKey);

function handleKey(e) {
  if (state.finished) return;

  if (e.key === 'Backspace') {
    e.preventDefault();
    if (state.position > 0) {
      state.position--;
      state.typed[state.position] = undefined;
    }
    if (!state.started) return;
    renderPassage();
    updateStats();
    return;
  }

  // Only handle printable single chars
  if (e.key.length !== 1) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  if (!state.started) startTest();

  if (state.position >= state.passage.length) return;

  const correct = e.key === state.passage[state.position];
  state.typed[state.position] = correct;
  if (!correct) state.totalErrors++;
  state.position++;

  renderPassage();
  updateStats();

  // check completion
  if (state.mode === 'passage' && state.position >= state.passage.length) {
    finishTest();
  }
}

// ─── FOCUS MANAGEMENT ───────────────────────────────────────────────────────
passageContainer.addEventListener('click', () => {
  hiddenInput.focus();
  if (!state.started && !state.finished) {
    // just focus, let them type to start
  }
});

startBtn.addEventListener('click', () => {
  hiddenInput.focus();
  startTest();
});

// ─── START / STOP ────────────────────────────────────────────────────────────
function startTest() {
  if (state.started || state.finished) return;
  state.started = true;
  state.startTime = Date.now();
  document.body.className = 'state-started';

  // Show timer bar for timed mode
  if (state.mode === 'timed') {
    timerBarWrap.style.display = 'block';
    timerBar.style.width = '100%';
    timerBar.style.background = 'hsl(214,100%,55%)';
  }

  state.timerInterval = setInterval(tick, 200);
}

function tick() {
  const elapsed = (Date.now() - state.startTime) / 1000;
  state.elapsed = elapsed;

  if (state.mode === 'timed') {
    const remaining = Math.max(0, 60 - elapsed);
    statTime.innerHTML = Math.ceil(remaining) + '<span id="time-unit">s</span>';
    const pct = (remaining / 60) * 100;
    timerBar.style.width = pct + '%';
    if (pct < 25) timerBar.style.background = 'hsl(354,63%,57%)';
    else if (pct < 50) timerBar.style.background = 'hsl(49,85%,70%)';
    if (remaining <= 0) { finishTest(); return; }
  } else {
    statTime.innerHTML = Math.floor(elapsed) + '<span id="time-unit">s</span>';
  }

  updateStats();
}

function updateStats() {
  const elapsedMin = state.elapsed / 60 || 0.001;
  const correctWords = state.typed.filter(Boolean).length / 5;
  const wpm = Math.round(correctWords / elapsedMin) || 0;
  statWpm.textContent = wpm;

  const total = state.typed.filter(v => v !== undefined).length;
  const correct = state.typed.filter(Boolean).length;
  const acc = total > 0 ? Math.round((correct / total) * 100) : 0;
  statAcc.innerHTML = (total > 0 ? acc : '—') + '<span>%</span>';
}

function finishTest() {
  if (state.finished) return;
  state.finished = true;
  clearInterval(state.timerInterval);

  const elapsedMin = state.elapsed / 60 || (1/60);
  const correctChars = state.typed.filter(Boolean).length;
  const totalTyped = state.typed.filter(v => v !== undefined).length;
  const wpm = Math.round((correctChars / 5) / elapsedMin);
  const acc = totalTyped > 0 ? Math.round((correctChars / totalTyped) * 100) : 0;
  const incorrectChars = state.totalErrors;

  showResults(wpm, acc, correctChars, incorrectChars);
}

// ─── RESULTS ─────────────────────────────────────────────────────────────────
function showResults(wpm, acc, correct, incorrect) {
  const isFirstTest = state.personalBest === null;
  const isNewPB = !isFirstTest && wpm > state.personalBest;

  document.getElementById('r-wpm').textContent = wpm;
  document.getElementById('r-accuracy').textContent = acc;
  document.getElementById('r-chars').textContent = correct;
  document.getElementById('r-chars-sub').textContent = incorrect > 0 ? `${incorrect} err` : 'no errors';

  const icon = document.getElementById('results-icon');
  const title = document.getElementById('results-title');
  const subtitle = document.getElementById('results-subtitle');
  const banner = document.getElementById('new-pb-banner-wrap');

  banner.innerHTML = '';

  if (isFirstTest) {
    icon.src = 'data:image/svg+xml,' + encodeURIComponent(`<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="28" fill="hsl(214,100%,55%)"/><path d="M18 28l7 7 13-14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`);
    icon.alt = 'Baseline established';
    title.textContent = 'Baseline Established!';
    subtitle.textContent = 'Great start! This sets your personal benchmark.';
    state.personalBest = wpm;
    localStorage.setItem('pb-wpm', wpm);
    updatePbDisplay();
  } else if (isNewPB) {
    icon.src = 'data:image/svg+xml,' + encodeURIComponent(`<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="28" fill="hsl(49,85%,70%)"/><path d="M28 12l4.18 8.47L42 22.18l-7 6.82 1.64 9.56L28 34.1l-8.64 4.46L21 28.9l-7-6.72 9.82-1.71L28 12z" fill="hsl(0,0%,7%)" stroke="hsl(0,0%,7%)" stroke-width="1"/></svg>`);
    icon.alt = 'New personal best';
    title.textContent = 'High Score Smashed! 🎉';
    subtitle.textContent = `New personal best! You beat ${state.personalBest} WPM.`;
    state.personalBest = wpm;
    localStorage.setItem('pb-wpm', wpm);
    updatePbDisplay();
    banner.innerHTML = `<div class="new-pb-banner">🏆 New Personal Best: ${wpm} WPM!</div>`;
    launchConfetti();
  } else {
    icon.src = 'data:image/svg+xml,' + encodeURIComponent(`<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="28" fill="hsl(240,3%,30%)"/><path d="M18 28l7 7 13-14" stroke="hsl(240,1%,59%)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`);
    icon.alt = 'Test complete';
    title.textContent = 'Test Complete!';
    subtitle.textContent = 'Solid run. Keep pushing to beat your high score.';
  }

  resultsOverlay.classList.add('visible');
}

goAgainBtn.addEventListener('click', resetTest);

function resetTest() {
  resultsOverlay.classList.remove('visible');
  clearInterval(state.timerInterval);
  state = {
    ...state,
    typed: [],
    position: 0,
    started: false,
    finished: false,
    startTime: null,
    elapsed: 0,
    timerInterval: null,
    totalErrors: 0,
  };
  document.body.className = 'state-not-started';
  timerBarWrap.style.display = 'none';
  timerBar.style.width = '100%';
  timerBar.style.background = 'hsl(214,100%,55%)';
  statWpm.textContent = '0';
  statAcc.innerHTML = '—<span>%</span>';
  statTime.innerHTML = '0<span>s</span>';
  loadPassage();
  hiddenInput.blur();
}

restartBtn.addEventListener('click', resetTest);

// ─── CONTROLS ────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-difficulty]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.started && !state.finished) return; // don't change mid-test
    document.querySelectorAll('[data-difficulty]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.difficulty = btn.dataset.difficulty;
    resetTest();
  });
});

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.started && !state.finished) return;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    resetTest();
  });
});

// ─── CONFETTI ────────────────────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['hsl(49,85%,70%)', 'hsl(214,100%,65%)', 'hsl(140,63%,57%)', 'hsl(354,63%,57%)', 'hsl(0,0%,100%)'];
  const pieces = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 100,
    r: 4 + Math.random() * 6,
    d: 0.5 + Math.random() * 1.5,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 2,
    vy: 1 + Math.random() * 3,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.1,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
  }));

  let frame;
  let startTime = Date.now();

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const elapsed = (Date.now() - startTime) / 1000;
    if (elapsed > 4) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      cancelAnimationFrame(frame);
      return;
    }
    pieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotSpeed;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - elapsed / 3);
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      if (p.y > canvas.height) {
        p.y = -10;
        p.x = Math.random() * canvas.width;
      }
    });
    frame = requestAnimationFrame(draw);
  }
  draw();
}

// ─── START ───────────────────────────────────────────────────────────────────
init();
</script>
